<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rousan Jr</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* Header */
header{
    width:100%;
    padding:25px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(8px);
}

.logo{
    font-size:32px;
    font-weight:900;
    letter-spacing:2px;
}

.menu{
    font-size:24px;
    font-weight:700;
    cursor:pointer;
}

/* Hero Section */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:120px 40px;
    position:relative;
    overflow:hidden;
}

/* Red glowing lines */
.hero::before,
.hero::after{
    content:'';
    position:absolute;
    width:900px;
    height:4px;
    background:linear-gradient(90deg,transparent,#ff2b2b,transparent);
    box-shadow:0 0 20px #ff2b2b;
    transform:rotate(45deg);
}

.hero::before{
    top:20%;
    left:-20%;
}

.hero::after{
    bottom:10%;
    right:-20%;
}

.content{
    position:relative;
    z-index:2;
    max-width:900px;
}

.content h1{
    font-size:clamp(50px,10vw,130px);
    line-height:0.9;
    color:#ff2b2b;
    font-weight:900;
    text-transform:uppercase;
    margin-bottom:20px;
}

.content p{
    font-size:15px;
    max-width:650px;
    color:#ddd;
    letter-spacing:1px;
    line-height:1.6;
}

/* Scroll Arrow */
.arrow{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    animation:updown 1.5s infinite;
}

@keyframes updown{
    0%,100%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,10px);}
}

/* Mobile */
@media(max-width:768px){
    header{
        padding:20px;
    }

    .logo{
        font-size:24px;
    }

    .menu{
        font-size:20px;
    }

    .content h1{
        font-size:60px;
    }

    .content p{
        font-size:12px;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">ROUSAN JR</div>
    <div class="menu">menu ☰</div>
</header>

<section class="hero">
    <div class="content">
        <h1>WELCOME<br>TO MY<br>WORLD</h1>
        <p>
            I CREATE MODERN DIGITAL EXPERIENCES WITH BOLD DESIGN, 
            CREATIVE IDEAS AND POWERFUL WEB TECHNOLOGY.
        </p>
    </div>

    <div class="arrow">↓</div>
</section>

</body>
  </html>
