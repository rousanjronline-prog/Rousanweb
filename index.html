<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To My World | Premium Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader">
        <div class="loader-text">INITIALIZING...</div>
        <div class="loader-bar"></div>
    </div>

    <div class="laser-container">
        <div class="laser"></div>
        <div class="laser"></div>
    </div>

    <nav>
        <div class="logo">KRAFTON-STYLE</div>
        <div class="menu-btn">
            <span></span>
            <span></span>
        </div>
    </nav>

    <main data-scroll-container>
        <section class="hero" data-scroll-section>
            <div class="hero-content">
                <h1 class="glitch-text" data-text="WELCOME TO MY WORLD">
                    WELCOME TO <br> <span>MY WORLD</span>
                </h1>
                <p class="sub-text">WE PIONEER THE PATH TO PLAYERS' DREAMS. <br> WITH BOLD IMAGINATION AND BREAKTHROUGH TECHNOLOGY.</p>
                <div class="scroll-indicator">
                    <div class="arrow"></div>
                </div>
            </div>
        </section>

        <section class="about" data-scroll-section>
            <div class="glass-card">
                <h2>THE VISION</h2>
                <p>Creating unforgettable digital experiences through high-fidelity design and modern transitions.</p>
            </div>
        </section>

        <section class="contact" data-scroll-section>
            <div class="contact-box">
                <h3>GET IN TOUCH</h3>
                <form>
                    <input type="text" placeholder="NAME" class="neon-input">
                    <input type="email" placeholder="EMAIL" class="neon-input">
                    <textarea placeholder="MESSAGE" class="neon-input"></textarea>
                    <button type="submit" class="glow-button">SEND SIGNAL</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
